<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Meu Primeiro Imóvel</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f172a">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  padding: 10px;
  text-align: center;
}

th { background: #334155; }

.pago { background: rgba(34,197,94,0.2); }

.diff-neg { color: red; }
.diff-pos { color: #22c55e; }

.status-pago { color: #22c55e; }
.status-pendente { color: #facc15; }

.resumo {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<div style="text-align:center; margin-bottom: 20px;">
  <h1>🏠 Meu Primeiro Imóvel</h1>
  <h3 style="color:#94a3b8;">Parque dos Coqueiros</h3>
  <p style="color:#cbd5f5;">📊 Controle Financeiro da Entrada</p>
</div>

<div class="card">

<table>
<thead>
<tr>
<th>#</th>
<th>Tipo</th>
<th>Vencimento</th>
<th>Esperado</th>
<th>Pago</th>
<th>Diferença</th>
<th>Status</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<div class="resumo">
<div id="totalPago">💰 Pago: R$ 0</div>
<div id="totalFalta">📉 Falta: R$ 0</div>
</div>

</div>
</div>

<script>
function addMes(data) {
  let d = new Date(data);
  d.setMonth(d.getMonth() + 1);
  d.setDate(30);
  if (d.getDate() !== 30) {
    d = new Date(d.getFullYear(), d.getMonth() + 1, 0);
  }
  return d;
}

function formatarData(data) {
  return data.toLocaleDateString('pt-BR');
}

function criarParcelas() {
  let tabela = document.getElementById("tabela");

  let hoje = new Date();
  let data = new Date(hoje.getFullYear(), hoje.getMonth(), 30);
  if (hoje.getDate() > 30) data = addMes(data);

  let parcelas = [];

  let valor = 400;
  for (let i = 1; i <= 30; i++) {
    valor *= (1 + 0.005);
    parcelas.push({num:i,tipo:"OBRA (INCC)",valor,data:new Date(data)});
    data = addMes(data);
  }

  valor = 220;
  for (let i = 1; i <= 84; i++) {
    valor *= (1 + 0.003);
    parcelas.push({num:i,tipo:"PÓS-CHAVE (IPCA)",valor,data:new Date(data)});
    data = addMes(data);
  }

  parcelas.forEach(p => {
    let linha = document.createElement("tr");

    linha.innerHTML = `
      <td>${p.num}</td>
      <td>${p.tipo}</td>
      <td>${formatarData(p.data)}</td>
      <td class="esperado">${p.valor.toFixed(2)}</td>
      <td><input type="number" step="0.01" class="pagoInput"></td>
      <td class="diff">-</td>
      <td class="status status-pendente">PENDENTE</td>
      <td><button class="btnPago">✔</button></td>
    `;

    tabela.appendChild(linha);
  });

  adicionarEventos();
}

function adicionarEventos() {
  document.querySelectorAll(".pagoInput").forEach(input => {
    input.addEventListener("input", atualizar);
  });

  document.querySelectorAll(".btnPago").forEach(btn => {
    btn.addEventListener("click", function() {
      let linha = this.parentElement.parentElement;
      let status = linha.querySelector(".status");

      linha.classList.toggle("pago");

      if (linha.classList.contains("pago")) {
        status.innerText = "PAGO";
        status.className = "status status-pago";
      } else {
        status.innerText = "PENDENTE";
        status.className = "status status-pendente";
      }

      atualizar();
    });
  });
}

function atualizar() {
  let linhas = document.querySelectorAll("#tabela tr");
  let totalPago = 0;
  let totalEsperado = 0;

  linhas.forEach(linha => {
    let esperado = parseFloat(linha.querySelector(".esperado").innerText);
    let pago = parseFloat(linha.querySelector(".pagoInput").value) || 0;
    let diffCell = linha.querySelector(".diff");

    totalEsperado += esperado;
    totalPago += pago;

    if (pago > 0) {
      let diff = pago - esperado;
      diffCell.innerText = diff.toFixed(2);
      diffCell.className = "diff " + (diff < 0 ? "diff-neg" : "diff-pos");
    } else {
      diffCell.innerText = "-";
    }
  });

  document.getElementById("totalPago").innerText =
    "💰 Pago: R$ " + totalPago.toFixed(2);

  document.getElementById("totalFalta").innerText =
    "📉 Falta: R$ " + (totalEsperado - totalPago).toFixed(2);
}

criarParcelas();

// registrar service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
